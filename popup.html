<!DOCTYPE html>
<html>
<head>
    <title>Quick Paste Hotkeys</title>
    <script src="popup.js" defer></script>
</head>
<body>
    <h3>Set Your Hotkeys and Text</h3>
    
    <label>Hotkey 1: <input id="hotkey1" class="hotkey" type="text" placeholder="Press keys..." readonly></label>

    <label>Hotkey 2: <input id="hotkey2" class="hotkey" type="text" placeholder="Press keys..." readonly></label>

    <button id="save">Save</button>
</body>
</html>
