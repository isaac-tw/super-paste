<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Super Paste</title>
    <script src="popup.js" defer></script>
</head>
<body>
    <h3>Super Paste</h3>
    <p>Save reusable snippets and trigger them with your own keyboard shortcuts.</p>
    <div id="hotkey-container"></div>
    <button id="add-hotkey">+ Add Hotkey</button>
    <button id="save">Save</button>
    <div>
        <button id="export-config">Export Config</button>
        <input type="file" id="import-config" style="display: none;" />
        <button id="import-config-btn">Import Config</button>
    </div>
</body>
</html>
