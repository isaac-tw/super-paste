<!DOCTYPE html>
<html>
<head>
    <title>Quick Paste Hotkeys</title>
    <script src="popup.js" defer></script>
</head>
<body>
    <h3>Set Your Hotkeys and Text</h3>
    
    <label>Hotkey 1: <input id="hotkey1" type="text" placeholder="e.g., Alt+Shift+1"></label>
    <input id="text1" type="text" placeholder="Text to paste"><br>
    
    <label>Hotkey 2: <input id="hotkey2" type="text" placeholder="e.g., Alt+Shift+2"></label>
    <input id="text2" type="text" placeholder="Text to paste"><br>

    <label>Hotkey 3: <input id="hotkey3" type="text" placeholder="e.g., Alt+Shift+3"></label>
    <input id="text3" type="text" placeholder="Text to paste"><br>

    <button id="save">Save</button>
</body>
</html>
